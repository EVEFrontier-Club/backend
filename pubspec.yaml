name: evefrontier_club_backend
description: Modular tools and analytics for the EVE Frontier universe. Reputation systems, player metrics, and community infrastructure — built with Dart.
version: 0.0.1
homepage: https://evefrontier.club
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  serverpod: ^3.4.4
  serverpod_auth_idp_server: ^3.4.4
  evefrontier_index_module:
    git:
      url: https://github.com/EVEFrontier-Club/evefrontier-index-module.git

dev_dependencies:
  lints: ">=3.0.0 <7.0.0"
  serverpod_test: ^3.4.4
  test: ^1.25.5

serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations
