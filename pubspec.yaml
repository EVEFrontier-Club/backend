name: evefrontier_club_server
description: Starting point for a Serverpod server.
version: 0.0.1
homepage: https:/evefrontier.club
publish_to: none

environment:
  sdk: "^3.8.0"

dependencies:
  serverpod: 3.4.2
  serverpod_auth_idp_server: 3.4.2
  trust_index_server:
    path: ../trust_index/server

dev_dependencies:
  lints: ">=3.0.0 <7.0.0"
  serverpod_test: 3.4.2
  test: ^1.25.5

serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations
