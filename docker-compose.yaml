services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: evefrontier_club
      POSTGRES_PASSWORD: "s8tdRwassdeePtNyQZzBQSsk-tEcTJNy"
    volumes:
      - evefrontier_club_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "vv4aNy7ni-vcJ6wg29b8vresa7U6krCg"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: evefrontier_club_test
      POSTGRES_PASSWORD: "SFS2AM5Ea15slMpdY2f9_3FHkVmQOohR"
    volumes:
      - evefrontier_club_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "2qyHqt3u_VWNa5QtTbwB67vEfgdxE3FW"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  evefrontier_club_data:
  evefrontier_club_test_data:
